services:
  # Backend API (Consolidated with Worker and Scheduler)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homenet-backend
    restart: always
    ports:
      - "3011:3333"
    environment:
      - TZ=Asia/Jakarta
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DB_CONNECTION=mysql
      - DB_HOST=localhost
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=myu2nnmd
      - DB_DATABASE=${DB_DATABASE:-homenet}
      - APP_KEY=${APP_KEY}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_USERNAME=${WHATSAPP_USERNAME}
      - WHATSAPP_PASSWORD=${WHATSAPP_PASSWORD}
    command: ./docker-entrypoint.sh
    networks:
      - homenet-network

  # Frontend Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homenet-frontend
    restart: always
    environment:
      - TZ=Asia/Jakarta
    ports:
      - "3021:80"
    depends_on:
      - backend
    networks:
      - homenet-network

networks:
  homenet-network:
    driver: bridge

volumes:
  db_data:
