services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: homenet-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-homenet}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      TZ: Asia/Jakarta
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homenet-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homenet-backend
    restart: always
    ports:
      - "3011:3333"
    environment:
      - TZ=Asia/Jakarta
      - NODE_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_DATABASE=${DB_DATABASE:-homenet}
      - APP_KEY=${APP_KEY}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_USERNAME=${WHATSAPP_USERNAME}
      - WHATSAPP_PASSWORD=${WHATSAPP_PASSWORD}
    command: ./docker-entrypoint.sh
    depends_on:
      db:
        condition: service_healthy
    networks:
      - homenet-network

  # Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homenet-worker
    restart: always
    environment:
      - TZ=Asia/Jakarta
      - NODE_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_DATABASE=${DB_DATABASE:-homenet}
      - APP_KEY=${APP_KEY}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_USERNAME=${WHATSAPP_USERNAME}
      - WHATSAPP_PASSWORD=${WHATSAPP_PASSWORD}
    command: node build/bin/console.js queue:work
    depends_on:
      db:
        condition: service_healthy
    networks:
      - homenet-network

  # Scheduler (Cron)
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homenet-scheduler
    restart: always
    environment:
      - TZ=Asia/Jakarta
      - NODE_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_DATABASE=${DB_DATABASE:-homenet}
      - APP_KEY=${APP_KEY}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}
      - WHATSAPP_API_URL=${WHATSAPP_API_URL}
      - WHATSAPP_USERNAME=${WHATSAPP_USERNAME}
      - WHATSAPP_PASSWORD=${WHATSAPP_PASSWORD}
    command: >
      sh -c "echo '0 1 * * * cd /app && node build/bin/console.js invoices:auto-generate >> /var/log/cron.log 2>&1' > /etc/crontabs/root && 
             echo '30 1 * * * cd /app && node build/bin/console.js invoices:check-isolation >> /var/log/cron.log 2>&1' >> /etc/crontabs/root && 
             crond -f -l 2"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - homenet-network

  # Frontend Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homenet-frontend
    restart: always
    environment:
      - TZ=Asia/Jakarta
    ports:
      - "3021:80"
    depends_on:
      - backend
    networks:
      - homenet-network

networks:
  homenet-network:
    driver: bridge

volumes:
  db_data:
